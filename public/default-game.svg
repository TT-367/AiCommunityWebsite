<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0B1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="675" rx="36" fill="url(#bg)"/>

  <circle cx="220" cy="130" r="180" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="980" cy="520" r="260" fill="#FFFFFF" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="170" y="160" width="860" height="355" rx="28" fill="url(#glass)"/>
    <rect x="170" y="160" width="860" height="355" rx="28" stroke="#FFFFFF" stroke-opacity="0.20"/>

    <rect x="240" y="230" width="520" height="56" rx="14" fill="#FFFFFF" opacity="0.18"/>
    <rect x="240" y="305" width="430" height="18" rx="9" fill="#FFFFFF" opacity="0.16"/>
    <rect x="240" y="335" width="360" height="18" rx="9" fill="#FFFFFF" opacity="0.14"/>

    <g>
      <rect x="810" y="240" width="150" height="150" rx="22" fill="#FFFFFF" opacity="0.16"/>
      <circle cx="868" cy="310" r="18" fill="#FFFFFF" opacity="0.30"/>
      <circle cx="912" cy="310" r="14" fill="#FFFFFF" opacity="0.26"/>
      <rect x="846" y="354" width="78" height="16" rx="8" fill="#FFFFFF" opacity="0.22"/>
    </g>
  </g>

  <text x="240" y="420" fill="#FFFFFF" opacity="0.92" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="600">暂无封面</text>
  <text x="240" y="455" fill="#FFFFFF" opacity="0.70" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14">上传图片后将显示你的游戏封面</text>
</svg>

